homebrew:
  applications:
    - alacritty
    - alfred
    - android-studio
    - background-music
    - claude
    - clipy
    - cmux
    - codex
    - cursor
    - docker
    - figma
    - ghostty
    - google-chrome
    - google-cloud-sdk
    - google-japanese-ime
    - linear-linear
    - notion
    - obsidian
    - ovice
    - slack
    - typora
    - visual-studio-code
    - workflowy
  tap_repositories:
    - dbt-labs/dbt
  packages:
    - ag
    - asdf
    - autoconf
    - chatgpt
    - cocoapods
    - coreutils
    - direnv
    - fswatch
    - fzf
    - gh
    - git
    - go
    - gpg
    - hub
    - java
    - jq
    - kubectl
    - kustomize
    - minikube
    - node
    - openssl
    - terragrunt
    - tig
    - tree
    - tmux
    - peco
    - yamllint

asdf:
  plugins:
    - ruby
    - elixir
    - erlang
    - nodejs
    - python
    - terraform
    - golang
    - rust
  global_settings:
    golang: 1.25.0
    nodejs: 23.10.0
    rust: 1.93.0

github:
  repositories:
    - git@github.com:mitsu9/Home.git
    - git@github.com:mitsu9/homelab.git
    - git@github.com:mitsu9/Lyceum.git

go:
  packages:
    - github.com/x-motemen/ghq@latest
    - golang.org/x/tools/cmd/goimports@latest
    - golang.org/x/tools/gopls@latest
    - github.com/ramya-rao-a/go-outline@latest
    - github.com/766b/go-outliner@latest
    - github.com/go-delve/delve/cmd/dlv@latest
    - github.com/cweill/gotests/gotests@v1.6.0
    - honnef.co/go/tools/cmd/staticcheck@2022.1
    - github.com/hhatto/gocloc/cmd/gocloc@latest
    - github.com/fzipp/gocyclo/cmd/gocyclo@latest

npm:
  packages:
    - "@abhiz123/todoist-mcp-server"
    - "@anthropic-ai/claude-code"
    - "@googleworkspace/cli"
    - "obsidian-headless"

uv:
  packages:
    - "specify-cli --from git+https://github.com/github/spec-kit.git"

links:
  - src: home/asdf/asdfrc
    dest: .asdfrc
  - src: home/zsh/zshrc
    dest: .zshrc
  - src: home/vim/vimrc
    dest: .vimrc
  - src: home/git/gitconfig
    dest: .gitconfig
  - src: home/git/gitignore
    dest: .gitignore
  - src: home/git/git_template
    dest: .git_template
  - src: home/npm/npmrc
    dest: .npmrc
  - src: home/tmux/tmux.conf
    dest: .tmux.conf
  - src: home/alacritty/alacritty.toml
    dest: .config/alacritty/alacritty.toml
  - src: home/ghostty/config
    dest: .config/ghostty/config
  - src: home/codex/config.toml
    dest: .codex/config.toml
  - src: home/codex/rules/default.rules
    dest: .codex/rules/default.rules
  - src: home/claude/settings.json
    dest: .claude/settings.json
  - src: home/shared/ai-skills
    dest: .claude/skills
  - src: home/shared/ai-skills
    dest: .codex/skills

copy:
  home/zsh/zshrc_local.sample: .zshrc_local

vim:
  dir: '{{ home_path }}/vim'

vscode:
  extensions:
    # base
    - MS-CEINTL.vscode-language-pack-ja
    - alefragnani.project-manager
    - vscodevim.vim
    - MS-vsliveshare.vsliveshare
    - inu1255.easy-snippet
    - eamodio.gitlens
    # color
    - cocopon.iceberg-theme
    # go
    - golang.Go
    - 766b.go-outliner
    - windmilleng.vscode-go-autotest
    # flutter
    - Dart-Code.flutter
    # swagger
    - Arjun.swagger-viewer
    # terraform
    - HashiCorp.terraform
    # docker
    - ms-azuretools.vscode-docker
    # makefile
    - ms-vscode.makefile-tools
    # TypeScript
    - dbaeumer.vscode-eslint
    - esbenp.prettier-vscode
    # perl
    - kraih.mojolicious
    # ts
    - astro-build.astro-vscode
